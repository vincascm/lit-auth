<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Lit Auth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-lg shadow-md w-96" x-data="registerForm()">
        <h2 class="text-2xl font-bold mb-6 text-center">Register</h2>
        <form @submit.prevent="submitForm">
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2" for="username">Username</label>
                <input type="text" id="username" x-model="username" required
                    class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-bold mb-2" for="password">Password</label>
                <input type="password" id="password" x-model="password" required
                    class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <button type="submit" :disabled="loading"
                class="w-full bg-blue-500 text-white font-bold py-2 px-4 rounded-md hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-500 disabled:opacity-50">
                <span x-show="!loading">Register</span>
                <span x-show="loading">Registering...</span>
            </button>
        </form>
        <p class="mt-4 text-center text-sm text-gray-600">
            Already have an account? <a href="/login" class="text-blue-500 hover:underline">Login</a>
        </p>
        <div x-show="message" :class="messageType === 'success' ? 'text-green-500' : 'text-red-500'"
            class="mt-4 text-center text-sm font-medium" x-text="message"></div>
    </div>

    <script>
        function registerForm() {
            return {
                username: '',
                password: '',
                loading: false,
                message: '',
                messageType: '',
                async submitForm() {
                    this.loading = true;
                    this.message = '';
                    try {
                        const response = await fetch('/auth/api/register', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ username: this.username, password: this.password })
                        });
                        const data = await response.json();
                        if (data.code === 0) {
                            this.message = 'Registration successful! Redirecting to login...';
                            this.messageType = 'success';
                            setTimeout(() => window.location.href = '/auth/login', 2000);
                        } else {
                            this.message = data.message || 'Registration failed';
                            this.messageType = 'error';
                        }
                    } catch (error) {
                        this.message = 'An error occurred. Please try again.';
                        this.messageType = 'error';
                    } finally {
                        this.loading = false;
                    }
                }
            }
        }
    </script>
</body>
</html>
